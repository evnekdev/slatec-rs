schema_version = 1
programme_task = "E02"
investigation_date = "2026-07-16"
canonical_selected = false

[status_definitions]
verified-identical = "Raw bytes were compared and matched."
verified-different = "Primary evidence proves a relevant difference in content, role, or relationship."
likely-identical = "Strong evidence suggests identity, but raw bytes were not compared."
possible-duplicate = "Artifacts overlap by name or distribution description; identity is unproved."
alternate-implementation = "Artifacts intentionally provide platform, site, precision, or package alternatives."
unresolved = "Evidence is insufficient for a narrower classification."

[method]
archive_download_completed = false
archive_download_failure = "Execution container could not resolve www.netlib.org; no archive bytes were obtained."
raw_checksums_calculated = false
normalized_checksums_calculated = false
program_unit_parser_run = false
web_indexes_inspected = true
selected_source_files_inspected = true

