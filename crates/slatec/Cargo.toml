[package]
name = "slatec"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Safe Rust interface to selected SLATEC numerical routines"

[features]
default = []
integrate = []
interpolate = []
optimize = []
special = []
full = ["integrate", "interpolate", "optimize", "special"]
blas-level1-validation = [
    "slatec-core/ffi-profile-gnu-mingw-x86_64",
    "slatec-sys/ffi-profile-gnu-mingw-x86_64",
]
blas-level1 = [
    "blas-level1-validation",
    "slatec-sys/raw-ffi-basic",
]
blas-level1-native-tests = ["blas-level1"]

[dependencies]
slatec-core.workspace = true
slatec-sys.workspace = true
