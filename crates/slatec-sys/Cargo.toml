[package]
name = "slatec-sys"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
links = "slatec"
build = "build.rs"
description = "Raw FFI bindings to selected SLATEC routines"

[dependencies]

[features]
default = []
raw-ffi = [
    "raw-ffi-numeric-scalar-subroutines",
    "raw-ffi-numeric-array-subroutines",
    "raw-ffi-scalar-functions",
    "raw-ffi-complex-arguments",
    "raw-ffi-logical",
    "raw-ffi-character",
]
raw-ffi-numeric-scalar-subroutines = []
raw-ffi-numeric-array-subroutines = []
raw-ffi-scalar-functions = []
raw-ffi-complex-arguments = []
raw-ffi-logical = []
raw-ffi-character = []
raw-ffi-callbacks = []
raw-ffi-infrastructure = []

[build-dependencies]
