name: Release consumers

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  linux-gnu-registry-only:
    name: Linux GNU registry-only consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@1.85.0
      # This library workspace deliberately does not commit Cargo.lock.
      - run: cargo fetch
      - name: Package-first Linux consumers without a Fortran compiler
        env:
          SLATEC_REGISTRY_TARGET: linux
          SLATEC_GFORTRAN: __slatec_no_gfortran_at_consumer_build_time__
        run: cargo run -p slatec-tools --bin slatec-corpus -- validate-registry-simulation --offline
      - name: Verify Linux carrier checksums and archive structure
        run: cargo run -p slatec-tools --bin slatec-corpus -- validate-final-release-audit --offline
      - name: Verify bundled consumer has no dynamic GNU Fortran runtime dependency
        run: |
          binary=$(find target -type f -name safe-bundled-all-families-linux | head -n 1)
          test -n "$binary"
          readelf -d "$binary"
          ! readelf -d "$binary" | grep -E 'libgfortran|libquadmath'

  windows-gnu-registry-only:
    name: Windows GNU registry-only consumer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Install the Rust GNU target and prepare the offline package-audit cache
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-gnu
          Add-Content $env:GITHUB_PATH 'C:\msys64\mingw64\bin'
          # Hosted Visual Studio images can change their `link.exe` behaviour
          # independently of the target under test. Build scripts run for the
          # MSVC host, so use Rust's bundled compatible linker for that host.
          $rustLld = Join-Path (rustc --print sysroot) 'lib\rustlib\x86_64-pc-windows-msvc\bin\rust-lld.exe'
          if (-not (Test-Path -LiteralPath $rustLld)) { throw "rust-lld is unavailable at $rustLld" }
          Add-Content $env:GITHUB_ENV "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$rustLld"
          # This library workspace deliberately does not commit Cargo.lock.
          # Vendor the complete lockfile graph before the later offline
          # registry and package-audit commands materialize isolated sources.
          cargo vendor --versioned-dirs target/ci-offline-package-vendor
      - name: Package-first Windows GNU consumers without a Fortran compiler
        shell: pwsh
        env:
          SLATEC_REGISTRY_TARGET: windows
          SLATEC_GFORTRAN: __slatec_no_gfortran_at_consumer_build_time__
        run: cargo run -p slatec-tools --bin slatec-corpus -- validate-registry-simulation --offline
      - name: Verify Windows carrier checksums and PE imports
        shell: pwsh
        run: |
          cargo run -p slatec-tools --bin slatec-corpus -- validate-final-release-audit --offline
          $binary = Get-ChildItem target -Recurse -Filter safe-bundled-all-families-windows.exe | Select-Object -First 1
          if ($null -eq $binary) { throw 'packaged Windows GNU consumer executable was not produced' }
          llvm-objdump -p $binary.FullName | Select-String 'DLL Name'
