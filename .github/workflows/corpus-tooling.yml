name: Corpus tooling

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  corpus-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - name: Validate repository guidance
        run: cargo run -p slatec-tools --bin slatec-corpus -- validate-agent-guidance
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Compile raw binding modules without native linking
        run: cargo check -p slatec-sys --all-features
      - name: Compile the complete safe facade with the inert external backend
        run: cargo check -p slatec --no-default-features --features std,external-backend,full
      - name: Check no_std capability layers
        run: |
          cargo check -p slatec --no-default-features
          cargo check -p slatec --no-default-features --features alloc
          cargo check -p slatec --no-default-features --features external-backend,blas-level1,blas-level2,blas-level3
      - name: Reject incompatible native providers
        run: |
          if cargo check -p slatec --no-default-features --features prebuilt,system,blas-level1; then
            echo "incompatible provider features unexpectedly succeeded"
            exit 1
          fi
          if cargo check -p slatec --no-default-features --features prebuilt,special-gamma; then
            echo "rights-blocked prebuilt provider unexpectedly succeeded"
            exit 1
          fi
      - name: Published-style external no_std consumer
        run: cargo check --manifest-path tests/consumers/external-blas-no-std/Cargo.toml
      - name: Additive family feature unification
        run: cargo check --manifest-path tests/consumers/feature-unification/Cargo.toml
      - name: Reject unified conflicting backends
        run: |
          if cargo check --manifest-path tests/consumers/backend-conflict/Cargo.toml; then
            echo "unified conflicting backends unexpectedly succeeded"
            exit 1
          fi
      - run: cargo test --workspace
      - name: Safe BLAS validation without native linking
        run: cargo test -p slatec --features blas-level1-validation
      - name: Prologue association and compact-output fixtures
        run: cargo test -p slatec-tools prologues::tests
      - name: Full-corpus audit fixtures
        run: cargo test -p slatec-tools full_corpus::tests
      - name: Complete-corpus selection fixtures
        run: cargo test -p slatec-tools complete_corpus::tests
      - name: Conservative FFI inventory fixtures
        run: cargo test -p slatec-tools ffi_inventory::tests
      - name: Native-pilot metadata fixtures
        run: cargo test -p slatec-tools native_probe::tests
      - name: Raw FFI classifier and binding fixtures
        run: cargo test -p slatec-tools raw_ffi::tests
      - name: Raw FFI validation fixtures
        run: cargo test -p slatec-tools ffi_validation::tests
      - name: Runtime-profile classification fixtures
        run: cargo test -p slatec-tools runtime_profile::tests
      - name: Runtime-gated safe-special metadata and determinism fixtures
        run: cargo test -p slatec-tools safe_special::tests
      - name: Safe quadrature callback and validation tests without native linking
        run: cargo test -p slatec --no-default-features --features std,external-backend,quadrature --lib
      - name: Runtime-gated safe-quadrature metadata and determinism fixtures
        run: cargo test -p slatec-tools safe_quadrature::tests
      - name: Safe scalar-root callback and validation tests without native linking
        run: cargo test -p slatec --no-default-features --features std,external-backend,roots --lib
      - name: Runtime-gated safe-root metadata and determinism fixtures
        run: cargo test -p slatec-tools safe_roots::tests
      - name: Safe API documentation inventory and determinism
        run: cargo test -p slatec-tools safe_api_docs::tests
      - name: Family closure and linkage metadata fixtures
        run: cargo test -p slatec-tools linkage::tests
      - name: Provider cache and publication metadata fixtures
        run: cargo test -p slatec-tools provider::tests
      - name: Package assembly contents
        run: cargo package --workspace --exclude slatec-tools --allow-dirty --no-verify
      - name: Documentation with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc -p slatec --no-default-features --features std,external-backend,full --no-deps
          cargo test --doc -p slatec --no-default-features --features std,external-backend,full
          cargo doc -p slatec --no-default-features --no-deps
          cargo doc -p slatec --no-default-features --features alloc --no-deps
